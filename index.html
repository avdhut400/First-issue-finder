<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Issue Finder 🎯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg: #080b14;
        --glass: rgba(255,255,255,0.04);
        --glass-hover: rgba(255,255,255,0.07);
        --glass-border: rgba(255,255,255,0.08);
        --glass-border-hover: rgba(139,92,246,0.55);
        --text: #e2e8ff;
        --muted: #4a5280;
        --accent: #8b5cf6;
        --accent2: #06b6d4;
        --yellow: #fbbf24;
        --red: #f87171;
        --green: #34d399;
        --sans: 'Outfit', sans-serif;
        --mono: 'JetBrains Mono', monospace;
      }
      html { font-size: 16px; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        overflow-x: hidden;
        
        background-image:
          radial-gradient(ellipse 80% 60% at 15% 5%,  rgba(139,92,246,0.14) 0%, transparent 55%),
          radial-gradient(ellipse 60% 50% at 85% 90%, rgba(6,182,212,0.09)  0%, transparent 55%),
          radial-gradient(ellipse 50% 40% at 50% 50%, rgba(244,114,182,0.05) 0%, transparent 65%);
      }
      
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 99px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
